# Bench / indoor testing: keeps capture JPEGs, uses a throwaway DB. Mock GPS gives a
# stable fix without gpsd/sky view (change mock coords if you care about map position).
# For real indoor GNSS: set use_mock_fix: false, run gpsd, relax min_satellites if needed.

model_path: "models/best.pt"
capture:
  camera_index: 0
  interval_sec: 2.0
  image_width: 1280
  image_height: 720
  temp_dir: "/tmp/pothole-captures"
  keep_images_for_debug: true
inference:
  pothole_class_name: "pothole"
  confidence_threshold: 0.5
gps:
  enabled: true
  min_fix_mode: 2
  min_satellites: 3
  use_mock_fix: true
  mock_latitude: 37.4219
  mock_longitude: -122.084
database:
  path: "data/indoor_test.db"
  dedup_distance_m: 10.0
alerts:
  radius_m: 30.0
  cooldown_sec: 15.0
notifier:
  mode: "console"
